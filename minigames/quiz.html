<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Quiz</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="container-fluid">
                <h1>Quiz Minigame</h1>
                <p>
                    Welcome to the Quiz Minigame! This is a test of general culture where you must prove your knowledge. Are you intelligent enough? 
                    You must only select one answer for each question. Start and enjoy!
                </p>
            </div>
            <div class="container">
                <div class="card bg-light">
                    <div class="card-body">
                        <section id="firstQuestion">
                            <h2 class="card-title text-center">First Question?</h2>
                            <div class="card-text">
                                <div class="form-check float-center">
                                    <input class="form-check-input" type="radio" name="firstQuestion" id="answer1">
                                    <label class="form-check-label" for="answer1">
                                        Answer 1
                                    </label>
                                </div>
                                <div class="form-check float-center">
                                    <input class="form-check-input" type="radio" name="firstQuestion" id="answer2">
                                    <label class="form-check-label" for="answer2">
                                        Answer 2
                                    </label>
                                </div>
                                <div class="form-check float-center">
                                    <input class="form-check-input" type="radio" name="firstQuestion" id="answer3">
                                    <label class="form-check-label" for="answer3">
                                        Answer 3
                                    </label>
                                </div>
                                <div class="form-check float-center">
                                    <input class="form-check-input" type="radio" name="firstQuestion" id="answer4">
                                    <label class="form-check-label" for="answer4">
                                        Answer 4
                                    </label>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
            <br>
            <div class="container">
                <button type="previousButton" class="btn btn-primary float-start">Previous</button>
                <button type="nextButton" class="btn btn-primary float-end">Next</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
